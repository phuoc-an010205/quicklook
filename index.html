<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Map Google Drive IDs → Local Folder</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="./asset/css/style.css">
</head>
<body>
  <div id="toast-container"></div>

  <div class="container">
    
    <!-- Header Card -->
    <section class="card">
       <h1 class="title-heading">Map Google Drive IDs → Local Folder</h1>
       <!-- Input Area -->
      <div class="grid-2">
        <div class="box-input">
          <div class="box-input__left">
          <label class="title-label">Dán nhiều link folder (mỗi link 1 dòng)</label>
          <textarea id="folder-links-multiple" class="textarea" rows="5" 
            placeholder="https://drive.google.com/drive/folders/1A8F..."></textarea>
           </div>
          <div class="button-group">
            <div style="display:flex; align-items:center; gap:8px;">
              <span style="font-size:14px; color:#cbd5e1;">Ổ đĩa:</span>
              <input id="drive-letter-input" maxlength="1" value="H" class="drive-letter">
            </div>
            
             <button id="btn-parse-links" class="btn btn-primary">
                   <i class="fa-solid fa-magnifying-glass"></i>
            <span>Phân tích link</span>
            </button>
            
            <button id="btn-pick-root" class="btn btn-secondary">
              <i class="fa-solid fa-folder-open"></i>
              <span>Chọn thư mục gốc</span>
            </button>
          </div>
        
        </div>
          <!-- <div class="box-input__right">
              <label class="title-label">IDs đã phân tích</label>
          <div id="parsed-ids-list">
               <div>
                 <h2 id="suggestedPath" >H:\.shortcut-targets-by-id\1sicILRgrN3gtts_Jemx4atyjrQj3ni5u</h2>
               </div>
               <div>
                 <button class="btn">Mở mapped</button>
                 <button class="btn">Xóa</button>
               </div>

          </div>
        </div> -->

        <!-- Parsed IDs -->
        
      </div>
    </section>

    <!-- Results: Compact toolbar + automatic image grid -->
    <section class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; flex-wrap:wrap; gap:10px;">
        <h2 style="margin:0; font-size:18px;">Ảnh đã map</h2>
        <div style="display:flex; gap:8px; flex-wrap:wrap;">
          <button id="btn-map-all" class="btn btn-primary" style="padding:8px 16px; font-size:13px;">
            <i class="fa-solid fa-link"></i> Map tất cả ID
          </button>
          <button id="btn-reload-previews" class="btn btn-secondary" style="padding:8px 16px; font-size:13px;">
            <i class="fa-solid fa-sync"></i> Tải lại ảnh
          </button>
        </div>
      </div>

      <!-- Automatic full image grid for ALL mapped Drive links -->
      <div id="all-previews-container" class="all-previews"
           style="display:flex; flex-direction:column; gap:20px;"></div>
    </section>

  </div>

 
  <script src="./asset/js/state.js"></script>
  <script src="./asset/js/utils.js"></script>
  <script src="./asset/js/directory.js"></script>
  <script src="./asset/js/mapping.js"></script>
  <script src="./asset/js/main.js"></script>
</body>
</html>
