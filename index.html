<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Map Google Drive IDs → Local Folder</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="./asset/css/style.css">
</head>
<body>
  <div id="toast-container"></div>

  <div class="container">
    
    <!-- Header Card -->
    <div class="card">
      <div class="header">
        <div>
          <h1>Map Google Drive IDs → Local Folder</h1>
          <p style="color:#94a3b8; margin:4px 0 0;">Dán link folder Drive, chọn thư mục trên máy và map ID sang folder con (FolderName\ID)</p>
        </div>
      </div>

      <!-- Input Area -->
      <div class="grid-3">
        <div>
          <label class="label">Dán nhiều link folder (mỗi link 1 dòng)</label>
          <textarea id="folder-links-multiple" class="textarea" rows="5" 
            placeholder="https://drive.google.com/drive/folders/1A8F..."></textarea>

          <div class="button-group">
            <div style="display:flex; align-items:center; gap:8px;">
              <span style="font-size:14px; color:#cbd5e1;">Ổ đĩa:</span>
              <input id="drive-letter-input" maxlength="1" value="H" class="drive-letter">
            </div>
            
             <button id="btn-parse-links" class="btn btn-primary">
                   <i class="fa-solid fa-magnifying-glass"></i>
            <span>Phân tích link</span>
            </button>
            
            <button id="btn-pick-root" class="btn btn-secondary">
              <i class="fa-solid fa-folder-open"></i>
              <span>Chọn thư mục gốc</span>
            </button>
          </div>
        </div>

        <!-- Parsed IDs -->
        <div>
          <label class="label">IDs đã phân tích</label>
          <div id="parsed-ids-list"></div>
        </div>
      </div>
    </div>

    <!-- Results Table + Image Preview -->
    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
        <h2 style="margin:0; font-size:20px;">Danh sách Folder đã Map</h2>
        <button id="btn-map-all" class="btn btn-primary" style="padding:8px 16px; font-size:13px;">
          <i class="fa-solid fa-link"></i> Map tất cả ID
        </button>
      </div>

      <!-- Table -->
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th style="width: 220px;">ID</th>
              <th style="width: 220px;">Folder Name</th>
              <th style="width: 120px; text-align:center;">Số lượng ảnh</th>
              <th style="width: 140px; text-align:center;">Hành động</th>
            </tr>
          </thead>
          <tbody id="shortcuts-table">
            <!-- JS sẽ render ở đây -->
          </tbody>
        </table>
      </div>

      <!-- Image Preview Section -->
      <div class="section" style="margin-top: 28px;">
        <div class="section-header">
          <div>
            <span class="section-title">Hình ảnh preview</span>
            <span id="folder-name-display" class="folder-name" style="margin-left:12px;">—</span>
          </div>
          <button id="btn-refresh" class="btn btn-secondary" style="padding:6px 14px; font-size:13px;">
            <i class="fa-solid fa-sync"></i> Refresh
          </button>
        </div>
        <div id="image-grid" class="image-grid"></div>
      </div>
    </div>

  </div>

 
  <script src="./asset/js/state.js"></script>
  <script src="./asset/js/utils.js"></script>
  <script src="./asset/js/directory.js"></script>
  <script src="./asset/js/mapping.js"></script>
  <script src="./asset/js/main.js"></script>
</body>
</html>
